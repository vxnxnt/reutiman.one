bots:
  # ALLOW GOOD
  - import: (data)/common/keep-internet-working.yaml 
  - import: (data)/crawlers/_allow-good.yaml
  # DENY BAD
  - import: (data)/meta/ai-block-aggressive.yaml
  - import: (data)/bots/_deny-pathological.yaml
  - import: (data)/bots/aggressive-brazilian-scrapers.yaml
  - import: (data)/common/rfc-violations.yaml
  # CHALLENGE AMBIGUOUS
  - import: (data)/clients/x-firefox-ai.yaml
  - name: should-have-accept
    expression: '!("Accept" in headers)'
    action: WEIGH
    weight:
      adjust: 5
  - name: generic-browser
    user_agent_regex: >-
      Mozilla|Opera
    action: WEIGH
    weight:
      adjust: 15

thresholds:
  - name: minimal-suspicion
    expression: weight < 0
    action: ALLOW

  - name: mild-suspicion
    expression:
      all:
        - weight >= 0
        - weight < 10
    action: CHALLENGE
    challenge:
      algorithm: metarefresh
      difficulty: 2

  - name: moderate-suspicion
    expression:
      all:
        - weight >= 10
        - weight < 20
    action: CHALLENGE
    challenge:
      algorithm: fast
      difficulty: 4

  - name: heavy-suspicion
    expression:
      all:
        - weight >= 20
        - weight < 50
    action: CHALLENGE
    challenge:
      algorithm: fast
      difficulty: 6

  - name: extreme-suspicion
    expression: weight >= 50
    action: CHALLENGE
    challenge:
      algorithm: fast
      diffculty: 8

status_codes:
  CHALLENGE: 200
  DENY: 200
